<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Recommender</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

<style>

body{
    background-color:#0f0f0f;
    color:white;
}

/* NAVBAR */

.navbar{
    background-color:#14532d;
}

.navbar-brand{
    color:white !important;
    font-size:24px;
    font-weight:bold;
}

.nav-link{
    color:white !important;
    font-size:18px;
}

.nav-link:hover{
    color:#90ee90 !important;
}

/* TITLE */

.title{
    margin-top:40px;
    font-size:45px;
    font-weight:bold;
}

/* CARDS */

.card{
    background-color:#1f1f1f;
    border:none;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    height:260px;
    object-fit:cover;
    border-radius:10px;
}

.book-title{
    font-weight:bold;
}

.author{
    color:#bfbfbf;
}

.stats{
    font-size:14px;
    color:#a8a8a8;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<a class="navbar-brand" href="/"> Book Recommender</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav ml-auto me-4">

<li class="nav-item">
<a class="nav-link" href="/">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/recommend">Recommend</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contact</a>
</li>

</ul>

</div>

</nav>

<div class="container">

<h1 class="text-center title">Top 50 Books</h1>

<div class="row">

{% for i in range(book_name|length) %}

<div class="col-md-3" style="margin-top:40px">

<div class="card">

<img src="{{ image[i] }}" class="card-img-top">

<div class="card-body">

<p class="book-title">{{ book_name[i] }}</p>

<p class="author">{{ author[i] }}</p>

<p class="stats">Votes: {{ votes[i] }}</p>

<p class="stats">Rating: {{ rating[i] }}</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
